<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download</title>

<style>
body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    padding: 20px;
}

.card {
    background: #1c1c1c;
    padding: 25px;
    border-radius: 14px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    animation: fadeIn 0.5s ease-in-out;
}

h2 {
    font-size: 18px;
    margin-bottom: 10px;
    word-wrap: break-word;
}

button {
    background: #00c853;
    border: none;
    padding: 15px 25px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    margin-top: 15px;
    width: 100%;
    transition: 0.2s;
}

button:hover {
    background: #00b248;
    transform: scale(1.03);
}

.note {
    margin-top: 15px;
    font-size: 13px;
    color: #aaa;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #666;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <h2>📁 {{ title }}</h2>

    <a href="/download?token={{ token }}">
        <button>⬇ Download Now</button>
    </a>

    <div class="note">
        🔐 Secure link • Expires in 48 hours
    </div>

    <div class="footer">
        Powered by DiskWala Ultra
    </div>
</div>

</body>
</html>
